<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cobbleverse — Legendary Pokédex</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@700;900&family=Rajdhani:wght@400;500;600;700&family=Sarabun:wght@300;400;600&display=swap" rel="stylesheet">
<style>
  :root {
    --gold: #f5c842;
    --gold2: #e0a800;
    --dark: #0a0b14;
    --dark2: #10121f;
    --dark3: #181b2e;
    --accent: #7b5ea7;
    --accent2: #a07dd6;
    --red: #e84040;
    --blue: #4a9eff;
    --green: #3ecf8e;
    --orange: #ff8c42;
    --ice: #a8e4f0;
    --shadow: rgba(245,200,66,0.15);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--dark);
    color: #e8e0f0;
    font-family: 'Rajdhani', 'Sarabun', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Starfield bg */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background: 
      radial-gradient(ellipse at 20% 20%, rgba(123,94,167,0.15) 0%, transparent 50%),
      radial-gradient(ellipse at 80% 80%, rgba(74,158,255,0.1) 0%, transparent 50%),
      radial-gradient(ellipse at 50% 50%, rgba(245,200,66,0.05) 0%, transparent 70%);
    pointer-events: none;
    z-index: 0;
  }

  /* Header */
  header {
    position: relative;
    text-align: center;
    padding: 60px 20px 40px;
    z-index: 1;
  }

  .header-subtitle {
    font-family: 'Rajdhani', sans-serif;
    font-size: 0.9rem;
    letter-spacing: 6px;
    text-transform: uppercase;
    color: var(--gold);
    margin-bottom: 12px;
    opacity: 0.85;
  }

  header h1 {
    font-family: 'Cinzel Decorative', serif;
    font-size: clamp(2rem, 6vw, 4.5rem);
    font-weight: 900;
    background: linear-gradient(135deg, var(--gold) 0%, #fff8c0 40%, var(--gold2) 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    text-shadow: none;
    line-height: 1.1;
    letter-spacing: 2px;
  }

  .header-line {
    width: 200px;
    height: 2px;
    background: linear-gradient(90deg, transparent, var(--gold), transparent);
    margin: 20px auto;
  }

  .header-desc {
    font-family: 'Sarabun', sans-serif;
    color: rgba(255,255,255,0.55);
    font-size: 1rem;
    font-weight: 300;
    letter-spacing: 0.5px;
  }

  /* Controls */
  .controls {
    position: relative;
    z-index: 1;
    max-width: 960px;
    margin: 0 auto 32px;
    padding: 0 20px;
    display: flex;
    gap: 12px;
    flex-wrap: wrap;
    align-items: center;
    justify-content: center;
  }

  .search-wrap {
    position: relative;
    flex: 1;
    min-width: 220px;
    max-width: 380px;
  }

  .search-wrap input {
    width: 100%;
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(245,200,66,0.25);
    border-radius: 8px;
    padding: 12px 16px 12px 44px;
    color: #fff;
    font-family: 'Sarabun', sans-serif;
    font-size: 0.95rem;
    outline: none;
    transition: border-color 0.2s, background 0.2s;
  }

  .search-wrap input:focus {
    border-color: var(--gold);
    background: rgba(245,200,66,0.08);
  }

  .search-wrap input::placeholder { color: rgba(255,255,255,0.3); }

  .search-icon {
    position: absolute;
    left: 14px;
    top: 50%;
    transform: translateY(-50%);
    color: rgba(245,200,66,0.5);
    font-size: 1.1rem;
  }

  .filter-btn {
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(255,255,255,0.12);
    border-radius: 8px;
    padding: 10px 16px;
    color: rgba(255,255,255,0.65);
    font-family: 'Rajdhani', sans-serif;
    font-size: 0.9rem;
    font-weight: 600;
    letter-spacing: 0.5px;
    cursor: pointer;
    transition: all 0.2s;
    text-transform: uppercase;
  }

  .filter-btn:hover, .filter-btn.active {
    background: var(--gold);
    border-color: var(--gold);
    color: var(--dark);
  }

  /* Stats bar */
  .stats-bar {
    position: relative;
    z-index: 1;
    text-align: center;
    margin-bottom: 28px;
    font-family: 'Rajdhani', sans-serif;
    font-size: 0.85rem;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: rgba(255,255,255,0.3);
  }

  .stats-bar span {
    color: var(--gold);
    font-weight: 700;
  }

  /* Grid */
  .grid {
    position: relative;
    z-index: 1;
    max-width: 1100px;
    margin: 0 auto;
    padding: 0 20px 80px;
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    gap: 18px;
  }

  /* Card */
  .card {
    background: linear-gradient(145deg, rgba(24,27,46,0.95), rgba(16,18,31,0.9));
    border: 1px solid rgba(255,255,255,0.07);
    border-radius: 14px;
    overflow: hidden;
    transition: transform 0.25s ease, border-color 0.25s, box-shadow 0.25s;
    cursor: default;
    position: relative;
  }

  .card:hover {
    transform: translateY(-4px);
    border-color: rgba(245,200,66,0.35);
    box-shadow: 0 12px 40px rgba(0,0,0,0.5), 0 0 0 1px rgba(245,200,66,0.1);
  }

  .card-accent {
    height: 3px;
    width: 100%;
  }

  .card-body {
    padding: 18px 20px 20px;
  }

  .card-header {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    gap: 10px;
    margin-bottom: 14px;
  }

  .pokemon-name {
    font-family: 'Cinzel Decorative', serif;
    font-size: 1.05rem;
    font-weight: 700;
    line-height: 1.3;
    color: #fff;
    flex: 1;
  }

  .pokemon-name small {
    display: block;
    font-family: 'Sarabun', sans-serif;
    font-size: 0.72rem;
    font-weight: 300;
    color: rgba(255,255,255,0.4);
    letter-spacing: 0.5px;
    margin-top: 2px;
  }

  .poke-icon {
    width: 38px;
    height: 38px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 1.4rem;
    flex-shrink: 0;
    border: 1px solid rgba(255,255,255,0.1);
  }

  .tags {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    margin-bottom: 12px;
  }

  .tag {
    font-family: 'Rajdhani', sans-serif;
    font-size: 0.72rem;
    font-weight: 700;
    letter-spacing: 1px;
    text-transform: uppercase;
    padding: 3px 9px;
    border-radius: 4px;
    border: 1px solid;
  }

  .info-rows { display: flex; flex-direction: column; gap: 8px; }

  .info-row {
    display: flex;
    gap: 10px;
    align-items: flex-start;
  }

  .info-label {
    font-family: 'Rajdhani', sans-serif;
    font-size: 0.72rem;
    font-weight: 700;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: rgba(255,255,255,0.35);
    min-width: 70px;
    flex-shrink: 0;
    padding-top: 1px;
  }

  .info-value {
    font-family: 'Sarabun', sans-serif;
    font-size: 0.88rem;
    color: rgba(255,255,255,0.82);
    line-height: 1.5;
    flex: 1;
  }

  .info-value strong {
    color: var(--gold);
    font-weight: 600;
  }

  .condition-badge {
    display: inline-block;
    background: rgba(245,200,66,0.12);
    border: 1px solid rgba(245,200,66,0.25);
    border-radius: 4px;
    padding: 2px 7px;
    font-size: 0.78rem;
    color: var(--gold);
    font-family: 'Rajdhani', sans-serif;
    font-weight: 600;
    margin: 2px 2px 0 0;
  }

  /* Category headers */
  .section-header {
    position: relative;
    z-index: 1;
    max-width: 1100px;
    margin: 0 auto 20px;
    padding: 0 20px;
  }

  .section-title {
    font-family: 'Cinzel Decorative', serif;
    font-size: 1.1rem;
    color: var(--gold);
    letter-spacing: 2px;
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .section-title::after {
    content: '';
    flex: 1;
    height: 1px;
    background: linear-gradient(90deg, rgba(245,200,66,0.4), transparent);
  }

  .no-results {
    position: relative;
    z-index: 1;
    text-align: center;
    padding: 60px 20px;
    color: rgba(255,255,255,0.25);
    font-family: 'Sarabun', sans-serif;
    font-size: 1.1rem;
    display: none;
  }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: var(--dark); }
  ::-webkit-scrollbar-thumb { background: rgba(245,200,66,0.3); border-radius: 3px; }

  /* Animation */
  .card { animation: fadeUp 0.4s ease both; }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .card:nth-child(1) { animation-delay: 0.03s; }
  .card:nth-child(2) { animation-delay: 0.06s; }
  .card:nth-child(3) { animation-delay: 0.09s; }
  .card:nth-child(4) { animation-delay: 0.12s; }
  .card:nth-child(5) { animation-delay: 0.15s; }

  .hidden { display: none !important; }

  @media (max-width: 600px) {
    .grid { grid-template-columns: 1fr; }
    header h1 { font-size: 1.8rem; }
  }

  /* Tooltip for summon items */
  .summon-item {
    background: rgba(74,158,255,0.1);
    border: 1px solid rgba(74,158,255,0.25);
    color: var(--blue);
    border-radius: 4px;
    padding: 2px 7px;
    font-size: 0.78rem;
    font-family: 'Rajdhani', sans-serif;
    font-weight: 600;
    display: inline-block;
    margin: 2px 2px 0 0;
  }

  .special-note {
    margin-top: 10px;
    padding: 8px 12px;
    background: rgba(232,64,64,0.08);
    border-left: 2px solid var(--red);
    border-radius: 0 6px 6px 0;
    font-size: 0.8rem;
    color: rgba(255,180,180,0.85);
    font-family: 'Sarabun', sans-serif;
    line-height: 1.5;
  }
</style>
</head>

// Deduplicate (Diancie appeared twice - remove mythical duplicate)
const seen = new Set();
const data = pokemons.filter(p => {
  const key = p.name + p.cat;
  if (seen.has(key)) return false;
  seen.add(key);
  return true;
});

const catColors = {
  legendary: { bg: 'rgba(245,200,66,0.12)', border: 'rgba(245,200,66,0.4)', text: '#f5c842', label: 'Legendary' },
  mythical:  { bg: 'rgba(160,125,214,0.15)', border: 'rgba(160,125,214,0.4)', text: '#c09aff', label: 'Mythical' },
  paradox:   { bg: 'rgba(62,207,142,0.1)', border: 'rgba(62,207,142,0.35)', text: '#3ecf8e', label: 'Paradox' },
  ultra:     { bg: 'rgba(74,158,255,0.1)', border: 'rgba(74,158,255,0.35)', text: '#4a9eff', label: 'Ultra Beast' },
};

let activeFilter = 'all';

function renderCards(items) {
  const grid = document.getElementById('cardGrid');
  grid.innerHTML = '';
  
  if (items.length === 0) {
    document.getElementById('noResults').style.display = 'block';
  } else {
    document.getElementById('noResults').style.display = 'none';
  }

  document.getElementById('countDisplay').textContent = items.length;
  document.getElementById('totalDisplay').textContent = data.length;

  items.forEach((p, i) => {
    const c = catColors[p.cat];
    const accentGrad = `linear-gradient(90deg, ${p.color}, ${c.text})`;
    
    const tagsHtml = `
      <div class="tags">
        <span class="tag" style="background:${c.bg};border-color:${c.border};color:${c.text}">${c.label}</span>
        <span class="tag" style="background:rgba(255,255,255,0.04);border-color:rgba(255,255,255,0.12);color:rgba(255,255,255,0.5)">Gen ${p.gen}</span>
      </div>`;

    const summonHtml = p.summon ? `
      <div class="info-row">
        <span class="info-label">วิธีเรียก</span>
        <span class="info-value">${p.summon.map(s => `<span class="summon-item">${s}</span>`).join('')}</span>
      </div>` : '';

    const noteHtml = p.note ? `<div class="special-note">⚠️ ${p.note}</div>` : '';

    const card = document.createElement('div');
    card.className = 'card';
    card.setAttribute('data-cat', p.cat);
    card.setAttribute('data-name', p.name.toLowerCase());
    card.style.animationDelay = `${i * 0.03}s`;
    card.innerHTML = `
      <div class="card-accent" style="background:${accentGrad}"></div>
      <div class="card-body">
        <div class="card-header">
          <div class="pokemon-name">
            ${p.name}
            ${p.altName ? `<small>${p.altName}</small>` : ''}
          </div>
          <div class="poke-icon" style="background:rgba(${hexToRgb(p.color)},0.15)">
            ${p.icon}
          </div>
        </div>
        ${tagsHtml}
        <div class="info-rows">
          <div class="info-row">
            <span class="info-label">Biome</span>
            <span class="info-value"><strong>${p.biome}</strong></span>
          </div>
          <div class="info-row">
            <span class="info-label">เวลา</span>
            <span class="info-value">${p.time}</span>
          </div>
          <div class="info-row">
            <span class="info-label">อากาศ</span>
            <span class="info-value">${p.weather}</span>
          </div>
          ${summonHtml}
        </div>
        ${noteHtml}
      </div>`;
    grid.appendChild(card);
  });
}

function hexToRgb(hex) {
  hex = hex.replace('#','');
  if (hex.length === 3) hex = hex.split('').map(c=>c+c).join('');
  const n = parseInt(hex, 16);
  return `${(n>>16)&255},${(n>>8)&255},${n&255}`;
}

function getFiltered() {
  const q = document.getElementById('searchInput').value.toLowerCase();
  return data.filter(p => {
    const matchCat = activeFilter === 'all' || p.cat === activeFilter;
    const matchSearch = p.name.toLowerCase().includes(q) || (p.altName||'').toLowerCase().includes(q);
    return matchCat && matchSearch;
  });
}

function filterCards() {
  renderCards(getFiltered());
}

function filterCategory(cat, btn) {
  activeFilter = cat;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  filterCards();
}

renderCards(data);
